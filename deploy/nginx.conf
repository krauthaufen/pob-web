# Rate limit for paste creation (5 per minute per IP)
limit_req_zone $binary_remote_addr zone=paste:10m rate=5r/m;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # gzip for large assets
    gzip on;
    gzip_types application/javascript application/json text/css application/wasm;
    gzip_min_length 1000;

    # --- Build sharing API (haste-server) ---

    # POST /api/documents — create paste (restricted to our origin)
    location = /api/documents {
        limit_except POST { deny all; }
        limit_req zone=paste burst=3 nodelay;

        # Only allow from our domains
        if ($http_origin !~ "^https://(pob\.awx\.at|pob\.haaser\.me)$") {
            return 403;
        }

        proxy_pass http://haste:7777/documents;
    }

    # GET /api/raw/:key — read paste (public)
    location /api/raw/ {
        limit_except GET { deny all; }
        proxy_pass http://haste:7777/raw/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- Reverse proxy for poe.ninja API (avoids CORS) ---

    location /poe-ninja-api/ {
        resolver 127.0.0.11 valid=30s;
        proxy_pass https://poe.ninja/;
        proxy_ssl_server_name on;
        proxy_set_header Host poe.ninja;
        proxy_set_header Accept-Encoding "";
    }

    # --- Static assets ---

    # Long cache for hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache data files (sprites, tree, lua bundle)
    location /data/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # WASM content type
    location ~* \.wasm$ {
        types { application/wasm wasm; }
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
